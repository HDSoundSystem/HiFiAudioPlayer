<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HiFi Audio Player</title>

        <link rel="icon" type="image/png" href="img/favicon.png">
        <link rel="apple-touch-icon" href="img/icon-192.png">
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#121212">

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
            rel="stylesheet">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    </head>
    <body>

        <div class="app-container">
            <div class="player-section">
                <div class="section-header">HiFi Audio Player</div>

                <div class="player-main-content">
                    <div id="art-container" class="art-wrapper"
                        style="display:none;">
                        <img id="album-art" src alt="Album Art">
                    </div>

                    <div class="text-info-container">
                        <h2 id="file-name">No track selected</h2>
                        <div id="artist-name"></div>
                    </div>

                    <div class="badge-container">
                        <span id="format-badge" class="badge-format"
                            style="display:none"></span>
                    </div>
                </div>

                <audio id="player" crossorigin="anonymous"></audio>

                <div class="custom-controls w-100">
                    <div class="time-display d-flex justify-content-between">
                        <span id="current-time" class="hifi-font">0:00</span>
                        <span id="duration" class="hifi-font">0:00</span>
                    </div>
                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar" id="progress-bar"
                            style="width: 0%;"></div>
                    </div>

                    <div class="main-actions">
                        <button class="nav-btn-alt" onclick="prevTrack()"><i
                                class="fas fa-backward-step"></i></button>
                        <button class="play-pause-btn"
                            id="play-pause-btn">PLAY</button>
                        <button class="nav-btn-alt" onclick="nextTrack()"><i
                                class="fas fa-forward-step"></i></button>
                    </div>

                    <div class="volume-control">
                        <div
                            class="d-flex justify-content-between align-items-center">
                            <span class="volume-label hifi-font">VOL</span>
                            <span id="volume-percent"
                                class="hifi-font">5%</span>
                        </div>
                        <div class="volume-container" id="volume-container">
                            <div class="volume-bar" id="volume-bar"
                                style="width: 5%;"></div>
                        </div>
                    </div>

                    <div class="visualizer-container">
                        <canvas id="visualizer"></canvas>
                    </div>
                </div>

                <div class="nav-controls">
                    <button class="nav-btn vu-active" id="vu-toggle-btn"
                        onclick="toggleVisualizer()">VU: ON</button>
                    <button class="nav-btn" id="shuffle-btn"
                        onclick="toggleShuffle()">SHUFFLE: OFF</button>
                    <button class="nav-btn" id="repeat-btn"
                        onclick="toggleRepeat()">REPEAT: OFF</button>
                    <button class="nav-btn" id="ab-loop-btn"
                        onclick="toggleABLoop()">A-B: OFF</button>
                    <button class="nav-btn" id="mute-btn"
                        onclick="toggleMute()">MUTE: OFF</button>
                    <button class="nav-btn" id="eq-btn"
                        onclick="toggleEQ()">EQ</button>
                </div>
            </div>

            <div class="playlist-section">
                <div class="playlist-header-row">
                    <div class="section-header">Playlist Queue</div>
                    <div class="playlist-actions">
                        <label for="file-input" class="upload-btn">Add
                            Files</label>
                        <button class="clear-btn"
                            onclick="clearPlaylist()">Clear</button>
                        <input type="file" id="file-input"
                            accept=".flac,.wav,.mp3,.m4a" multiple
                            style="display:none;">
                    </div>
                </div>

                <div id="album-info-display" class="album-meta-row"
                    style="display: none;">
                    ALBUM : <span id="album-title-text"></span>
                </div>

                <div class="playlist-items" id="playlist"></div>
            </div>
            <div class="eq-section" id="eq-panel">
                <div class="section-header"
                    style="margin-bottom:15px;">Equalizer</div>

                <!-- EQ Curve Canvas -->
                <canvas id="eq-curve" class="eq-curve-canvas"></canvas>

                <!-- 10 Band Sliders -->
                <div class="eq-bands">
                    <div class="eq-band" data-band="0">
                        <span class="eq-gain-label" id="gain-label-0">0</span>
                        <input type="range" class="eq-slider" id="eq-0"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">32</span>
                    </div>
                    <div class="eq-band" data-band="1">
                        <span class="eq-gain-label" id="gain-label-1">0</span>
                        <input type="range" class="eq-slider" id="eq-1"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">64</span>
                    </div>
                    <div class="eq-band" data-band="2">
                        <span class="eq-gain-label" id="gain-label-2">0</span>
                        <input type="range" class="eq-slider" id="eq-2"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">125</span>
                    </div>
                    <div class="eq-band" data-band="3">
                        <span class="eq-gain-label" id="gain-label-3">0</span>
                        <input type="range" class="eq-slider" id="eq-3"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">250</span>
                    </div>
                    <div class="eq-band" data-band="4">
                        <span class="eq-gain-label" id="gain-label-4">0</span>
                        <input type="range" class="eq-slider" id="eq-4"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">500</span>
                    </div>
                    <div class="eq-band" data-band="5">
                        <span class="eq-gain-label" id="gain-label-5">0</span>
                        <input type="range" class="eq-slider" id="eq-5"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">1k</span>
                    </div>
                    <div class="eq-band" data-band="6">
                        <span class="eq-gain-label" id="gain-label-6">0</span>
                        <input type="range" class="eq-slider" id="eq-6"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">2k</span>
                    </div>
                    <div class="eq-band" data-band="7">
                        <span class="eq-gain-label" id="gain-label-7">0</span>
                        <input type="range" class="eq-slider" id="eq-7"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">4k</span>
                    </div>
                    <div class="eq-band" data-band="8">
                        <span class="eq-gain-label" id="gain-label-8">0</span>
                        <input type="range" class="eq-slider" id="eq-8"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">8k</span>
                    </div>
                    <div class="eq-band" data-band="9">
                        <span class="eq-gain-label" id="gain-label-9">0</span>
                        <input type="range" class="eq-slider" id="eq-9"
                            min="-12" max="12" value="0" step="0.5"
                            orient="vertical">
                        <span class="eq-freq-label">16k</span>
                    </div>
                </div>

                <!-- dB scale -->
                <div class="eq-db-scale">
                    <span>+12</span><span>+6</span><span>0</span><span>-6</span><span>-12</span>
                </div>

                <!-- Presets -->
                <div class="eq-presets">
                    <button class="eq-preset-btn"
                        onclick="applyPreset('POP')">POP</button>
                    <button class="eq-preset-btn"
                        onclick="applyPreset('ROCK')">ROCK</button>
                    <button class="eq-preset-btn"
                        onclick="applyPreset('JAZZ')">JAZZ</button>
                    <button class="eq-preset-btn"
                        onclick="applyPreset('CLASSIC')">CLASSIC</button>
                    <button class="eq-preset-btn"
                        onclick="applyPreset('LIVE')">LIVE</button>
                </div>

                <!-- Bass / Treble / Loudness -->
                <div class="eq-bottom-controls">
                    <div class="eq-knob-group">
                        <span class="eq-knob-label">BASS</span>
                        <div class="eq-knob-slider-wrap">
                            <input type="range" class="eq-knob-slider"
                                id="bass-ctrl" min="-12" max="12" value="0"
                                step="0.5">
                        </div>
                        <span class="eq-knob-value" id="bass-val">0 dB</span>
                    </div>
                    <div class="eq-knob-group">
                        <span class="eq-knob-label">TREBLE</span>
                        <div class="eq-knob-slider-wrap">
                            <input type="range" class="eq-knob-slider"
                                id="treble-ctrl" min="-12" max="12" value="0"
                                step="0.5">
                        </div>
                        <span class="eq-knob-value" id="treble-val">0 dB</span>
                    </div>
                    <div class="eq-loudness-group">
                        <button class="nav-btn" id="loudness-btn"
                            onclick="toggleLoudness()">LOUDNESS: OFF</button>
                        <button class="nav-btn" id="eq-reset-btn"
                            onclick="resetEQ()">RESET</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
